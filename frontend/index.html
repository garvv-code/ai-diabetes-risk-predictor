<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered diabetes risk predictor using machine learning. Enter your health metrics and get an instant risk assessment." />
  <title>AI Diabetes Risk Predictor</title>

  <!-- Google Fonts — Inter for clean modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ─── Animated background particles ─── -->
  <div class="bg-particles" aria-hidden="true">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════ -->
  <main id="app">
    <!-- ── Header ── -->
    <header class="hero">
      <div class="hero__icon" aria-hidden="true">🩺</div>
      <h1 class="hero__title">AI Diabetes Risk Predictor</h1>
      <p class="hero__subtitle">
        Enter your health metrics below and let our machine-learning model
        assess your diabetes risk instantly.
      </p>
    </header>

    <!-- ── Form Card ── -->
    <section class="card glass" aria-label="Health metrics form">
      <form id="predict-form" novalidate>
        <div class="form-grid">

          <!-- Pregnancies -->
          <div class="field" id="field-pregnancies">
            <label for="pregnancies">Pregnancies</label>
            <input
              type="range" id="pregnancies" name="pregnancies"
              min="0" max="20" value="1" step="1"
            />
            <output for="pregnancies" id="pregnancies-val">1</output>
          </div>

          <!-- Glucose -->
          <div class="field" id="field-glucose">
            <label for="glucose">Glucose <span class="unit">mg/dL</span></label>
            <input
              type="number" id="glucose" name="glucose"
              min="0" max="300" value="" placeholder="e.g. 120"
              required
            />
          </div>

          <!-- Blood Pressure -->
          <div class="field" id="field-bp">
            <label for="bp">Blood Pressure <span class="unit">mm Hg</span></label>
            <input
              type="number" id="bp" name="bp"
              min="0" max="200" value="" placeholder="e.g. 72"
              required
            />
          </div>

          <!-- Skin Thickness -->
          <div class="field" id="field-skin">
            <label for="skin">Skin Thickness <span class="unit">mm</span></label>
            <input
              type="range" id="skin" name="skin"
              min="0" max="100" value="20" step="1"
            />
            <output for="skin" id="skin-val">20</output>
          </div>

          <!-- Insulin -->
          <div class="field" id="field-insulin">
            <label for="insulin">Insulin <span class="unit">µU/mL</span></label>
            <input
              type="number" id="insulin" name="insulin"
              min="0" max="900" value="" placeholder="e.g. 80"
              required
            />
          </div>

          <!-- BMI -->
          <div class="field" id="field-bmi">
            <label for="bmi">BMI <span class="unit">kg/m²</span></label>
            <input
              type="number" id="bmi" name="bmi"
              min="0" max="80" value="" placeholder="e.g. 32.0"
              step="0.1" required
            />
          </div>

          <!-- Diabetes Pedigree Function -->
          <div class="field" id="field-dpf">
            <label for="dpf">Diabetes Pedigree Function</label>
            <input
              type="number" id="dpf" name="dpf"
              min="0" max="3" value="" placeholder="e.g. 0.627"
              step="0.001" required
            />
          </div>

          <!-- Age -->
          <div class="field" id="field-age">
            <label for="age">Age <span class="unit">years</span></label>
            <input
              type="range" id="age" name="age"
              min="1" max="120" value="30" step="1"
            />
            <output for="age" id="age-val">30</output>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">
          <span class="btn-text">Check Diabetes Risk</span>
          <span class="btn-loader" aria-hidden="true">
            <span class="spinner"></span> Analyzing…
          </span>
        </button>
      </form>
    </section>

    <!-- ── Result Card (hidden until prediction) ── -->
    <section id="result-card" class="card glass result-card hidden" aria-live="polite">
      <div id="result-icon" class="result-icon"></div>
      <h2 id="result-title" class="result-title"></h2>
      <p id="result-desc" class="result-desc"></p>

      <!-- Probability bar -->
      <div class="progress-wrapper">
        <div class="progress-label">
          <span>Risk Probability</span>
          <span id="prob-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="prob-bar" class="progress-fill" style="width:0%"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>
      ⚕️ <strong>Disclaimer:</strong> For educational purposes only.
      This tool is <em>not</em> a substitute for professional medical advice.
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
